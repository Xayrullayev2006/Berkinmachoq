<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hide & Seek: Chameleon</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px; text-align: center; color: white; pointer-events: auto; }
        input, button { padding: 10px; margin: 10px 0; width: 80%; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; }
        button { background: #e74c3c; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c0392b; }
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; touch-action: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        #action-btn { position: absolute; bottom: 40px; right: 30px; width: 80px; height: 80px; background: rgba(46, 204, 113, 0.7); border-radius: 50%; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; pointer-events: auto; user-select: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="main-menu" class="menu">
            <h2>Hide & Seek</h2>
            <input type="text" id="roomCode" placeholder="Xona kodi (masalan: 777)">
            <button onclick="joinGame()">O'yinga kirish</button>
        </div>

        <div id="joystick-zone" style="display: none;">
            <div id="joystick-knob"></div>
        </div>
        <div id="action-btn" style="display: none;">KAMUFLYAJ</div>
    </div>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <audio id="camo-sound" src="path_to_your_camo_sound.mp3"></audio>

<script>
    // Telegram Web App integratsiyasi
    const tg = window.Telegram.WebApp;
    tg.expand();

    const socket = io('https://SIZNING-BACKEND-LINKINGIZ.com'); // Backend manzilingizni qo'yasiz
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let currentRoom = '';
    let players = {};
    let myId = null;

    // O'yin holati
    const me = { x: 400, y: 300, speed: 4, camouflaged: false, color: '#e74c3c', vx: 0, vy: 0 };

    // Level Design: 3D ko'rinishdagi binolar
    const buildings = [
        { x: 200, y: 200, width: 150, height: 150, color: '#8e44ad', type: 'solid' },
        { x: 600, y: 100, width: 200, height: 150, color: '#2980b9', type: 'enterable' }, // Ichiga kirib yashirinish mumkin
        { x: 300, y: 500, width: 300, height: 100, color: '#f39c12', type: 'solid' }
    ];

    // Xonaga kirish
    function joinGame() {
        const code = document.getElementById('roomCode').value;
        if(code.trim() === '') return;
        
        currentRoom = code;
        socket.emit('joinRoom', currentRoom);
        
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('joystick-zone').style.display = 'block';
        document.getElementById('action-btn').style.display = 'flex';
        
        document.getElementById('bg-music').play().catch(e => console.log("Avto-play bloklandi"));
    }

    socket.on('connect', () => { myId = socket.id; });
    
    socket.on('updatePlayers', (serverPlayers) => {
        players = serverPlayers;
    });

    // --- Boshqaruv (Joystick) ---
    const joystick = document.getElementById('joystick-zone');
    const knob = document.getElementById('joystick-knob');
    let isDragging = false;

    joystick.addEventListener('touchstart', handleJoystick);
    joystick.addEventListener('touchmove', handleJoystick);
    joystick.addEventListener('touchend', () => {
        isDragging = false;
        me.vx = 0; me.vy = 0;
        knob.style.transform = `translate(0px, 0px)`;
    });

    function handleJoystick(e) {
        e.preventDefault();
        isDragging = true;
        const rect = joystick.getBoundingClientRect();
        const touch = e.touches[0];
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const distance = Math.sqrt(dx*dx + dy*dy);
        const maxDist = rect.width / 2 - 25;

        if (distance > maxDist) {
            dx = (dx / distance) * maxDist;
            dy = (dy / distance) * maxDist;
        }

        knob.style.transform = `translate(${dx}px, ${dy}px)`;
        
        me.vx = (dx / maxDist) * me.speed;
        me.vy = (dy / maxDist) * me.speed;
    }

    // --- Kamuflyaj Mexanikasi ---
    document.getElementById('action-btn').addEventListener('touchstart', () => {
        me.camouflaged = !me.camouflaged;
        if(me.camouflaged) {
            // Turgan joyining fon rangini olish (Chameleon effect)
            const pixel = ctx.getImageData(me.x, me.y, 1, 1).data;
            me.color = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
            document.getElementById('camo-sound').play();
            document.getElementById('action-btn').style.background = 'rgba(231, 76, 60, 0.7)';
        } else {
            me.color = '#e74c3c'; // Asliga qaytish
            document.getElementById('action-btn').style.background = 'rgba(46, 204, 113, 0.7)';
        }
    });

    // --- RENDER (Game Loop) ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Zaminni chizish (Yashil maydon, plitkalar qo'shsangiz ham bo'ladi)
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Binolarni chizish (Level Design)
        buildings.forEach(b => {
            // Psevdo-3D Soya va devorlar
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(b.x + 10, b.y + 10, b.width, b.height); // Soya
            
            // Bino tomi
            ctx.fillStyle = b.color;
            
            // Agar bino ichiga kiriladigan bo'lsa va o'yinchi ichida bo'lsa tomni shaffof qilish
            if (b.type === 'enterable' && 
                me.x > b.x && me.x < b.x + b.width && 
                me.y > b.y && me.y < b.y + b.height) {
                ctx.globalAlpha = 0.3; // Shaffoflik
            } else {
                ctx.globalAlpha = 1.0;
            }
            ctx.fillRect(b.x, b.y, b.width, b.height);
            ctx.globalAlpha = 1.0;
        });

        // 3. O'zimizning joylashuvni yangilash
        me.x += me.vx;
        me.y += me.vy;

        // Devorlar bilan to'qnashuv (Collision)
        buildings.forEach(b => {
            if (b.type === 'solid') {
                if (me.x + 15 > b.x && me.x - 15 < b.x + b.width && 
                    me.y + 15 > b.y && me.y - 15 < b.y + b.height) {
                    me.x -= me.vx; // Orqaga qaytarish
                    me.y -= me.vy;
                }
            }
        });

        // Serverga o'z holatimizni jo'natish (Faqat xonada bo'lsak)
        if (currentRoom) {
            socket.emit('playerMovement', {
                room: currentRoom, x: me.x, y: me.y, 
                camouflaged: me.camouflaged, color: me.color
            });
        }

        // 4. Barcha o'yinchilarni chizish
        for (let id in players) {
            let p = id === myId ? me : players[id];

            ctx.beginPath();
            ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
            
            if (p.camouflaged) {
                // SIZ SO'RAGAN ASOSIY QISMI: Bilinar-bilinmas kontur
                ctx.fillStyle = p.color; // Atrof-muhit rangi
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)'; // Qiyin ko'rinadigan chiziq
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
            } else {
                ctx.fillStyle = p.color;
                ctx.fill();
                // Oddiy holatda 3D qabariq berish
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }

        requestAnimationFrame(draw);
    }

    draw(); // Game Loopni boshlash
</script>
</body>
</html>
