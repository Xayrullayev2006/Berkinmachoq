<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; }</style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function preload() {
            this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
        }

        function create() {
            // 1. Devorlarni yaratamiz (labirint uchun)
            this.walls = this.physics.add.staticGroup();
            this.walls.create(400, 100, null).setDisplaySize(600, 20).refreshBody(); // Yuqori devor
            this.walls.create(400, 500, null).setDisplaySize(600, 20).refreshBody(); // Pastki devor
            this.walls.create(100, 300, null).setDisplaySize(20, 400).refreshBody(); // Chap devor
            this.walls.create(700, 300, null).setDisplaySize(20, 400).refreshBody(); // O'ng devor
            this.walls.create(400, 300, null).setDisplaySize(200, 20).refreshBody(); // O'rtadagi to'siq

            // 2. Qahramonni yaratamiz
            this.player = this.physics.add.sprite(200, 200, 'dude');
            this.physics.add.collider(this.player, this.walls); // Devorga urilish

            // 3. Animatsiyalar
            this.anims.create({ key: 'left', frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
            this.anims.create({ key: 'turn', frames: [ { key: 'dude', frame: 4 } ], frameRate: 20 });
            this.anims.create({ key: 'right', frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            this.player.setVelocity(0);
            if (this.cursors.left.isDown) { this.player.setVelocityX(-160); this.player.anims.play('left', true); }
            else if (this.cursors.right.isDown) { this.player.setVelocityX(160); this.player.anims.play('right', true); }
            else { this.player.setVelocityY(0); this.player.anims.play('turn'); }
            
            if (this.cursors.up.isDown) { this.player.setVelocityY(-160); }
            else if (this.cursors.down.isDown) { this.player.setVelocityY(160); }
        }
    </script>
</body>
</html>
