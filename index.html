<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            scene: {
                create: create
            }
        };

        const game = new Phaser.Game(config);

        function create() {
            // Qahramon uchun oddiy kvadrat
            this.player = this.add.rectangle(400, 300, 50, 50, 0xff0000);
            this.add.text(400, 100, 'Ghost Hunters: Qahramon tayyor!', { fill: '#fff' }).setOrigin(0.5);
        }
    </script>
</body>
</html>
